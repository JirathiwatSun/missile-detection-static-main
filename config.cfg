# =============================================================================
#
#   IRON DOME MISSILE TRACKER v3  —  Configuration File
#
#   Edit values here to tune the system.
#   Rules:
#     • Lines starting with  #  are comments (ignored)
#     • Format: KEY=VALUE  (no spaces around =)
#     • Any value can be overridden once per run on the command line:
#         run.bat track --video footage.mp4 --conf 0.30
#
# =============================================================================


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  MODEL                                                                  │
# └─────────────────────────────────────────────────────────────────────────┘

# Path to the YOLO model weights file
WEIGHTS=models\yolo26n_custom.pt

# YOLO detection confidence threshold   range: 0.10 – 0.60
# Lower = more detections (may raise false positives)
CONF=0.27


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  HARDWARE                                                               │
# └─────────────────────────────────────────────────────────────────────────┘

# GPU device: 0 = primary GPU | cpu = CPU-only | (empty) = auto-detect
DEVICE=0


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  DISPLAY & SENSITIVITY                                                  │
# └─────────────────────────────────────────────────────────────────────────┘

# Mean frame brightness below which night mode activates   range: 30 – 100
NIGHT_SENS=60

# Default display filter   options: thermal | nvg | original
DEF_FILTER=thermal

# YOLO confidence reduction applied in night mode          range: 0.00 – 0.25
NIGHT_CONF_OFFSET=0.10

# Phase-correlation threshold for camera-shake compensation range: 0.01 – 0.15
CAM_MOTION=0.03


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  IR / NIGHT FLAME DETECTOR                                              │
# └─────────────────────────────────────────────────────────────────────────┘

# Global pixel brightness for exhaust detection            range: 100 – 220
# Lower catches dimmer exhausts; raise to reduce city-light false positives
BRIGHT_THRESH=105

# Minimum IR blob area in pixels                           range: 2 – 20
MIN_FLAME=4

# Maximum IR blob area (prevents explosion fireballs)      range: 10000 – 200000
MAX_FLAME=150000

# Frame-edge margin to ignore (TV logos / borders)         range: 0.02 – 0.10
EDGE_MARGIN=0.06

# Aspect-ratio gate — rejects elongated blobs              range: 2.0 – 10.0
MAX_ASPECT=3.5

# IR hit confidence gate (above the horizon line)          range: 0.10 – 0.50
FLAME_MIN_CONF=0.20


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  BACKGROUND SUBTRACTOR  (MOG2)                                          │
# └─────────────────────────────────────────────────────────────────────────┘

# Frames used to build the static background model         range: 50 – 500
# 150 ≈ 5 s at 30 fps before a stopped object fades to background
MOG_HISTORY=150

# Variance threshold — lower flags more motion             range: 10 – 60
MOG_VAR=20


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  IR CLUSTER FILTER  (city-light rejection)                              │
# └─────────────────────────────────────────────────────────────────────────┘

# Neighbor-search radius in pixels                         range: 20 – 120
CLUSTER_RADIUS=60

# Max neighbors before a blob is rejected as a city-light  range: 2 – 10
# 10 = allows large missile salvos before cluster rejection kicks in
CLUSTER_MAX=10


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  STATIC LIGHT FILTER                                                    │
# └─────────────────────────────────────────────────────────────────────────┘

# Grid cell size in pixels                                 range: 10 – 60
STATIC_GRID=30

# Frames before a world-coord static light is suppressed   range: 3 – 20
# 15 = missiles can hover head-on ~0.5 s before assumed as city lights
WORLD_THRESH=15

# Frames before a screen-coord static light is suppressed  range: 10 – 40
# (TV logos, lens flares)
CAM_THRESH=25

# Frames before a suppressed grid cell is re-enabled       range: 5 – 30
STATIC_DECAY=15


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  GROUND EXCLUSION                                                       │
# └─────────────────────────────────────────────────────────────────────────┘

# Initial horizon fraction (night mode baseline)           range: 0.40 – 0.95
# Day mode ignores this and forces the line to 1.0 (no exclusion)
GROUND_FRAC=0.70

# Auto-horizon EMA speed                                   range: 0.05 – 0.50
# Lower = smoother / slower horizon adaptation
AUTO_ALPHA=0.10

# Min IR confidence for detections BELOW the horizon       range: 0.10 – 1.00
# 1.00 = disable below-ground IR; 0.35 = strict gate to block city clutter
BELOW_GROUND_CONF=0.35

# Min YOLO confidence for detections BELOW the horizon     range: 0.50 – 1.00
# 1.00 = disable below-ground YOLO; 0.50 = permissive
YOLO_GROUND_CONF=0.80


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  EXPLOSION / FLASH IMMUNITY                                             │
# └─────────────────────────────────────────────────────────────────────────┘

# Brightness ratio that triggers flash detection           range: 1.2 – 3.0
# 1.6 = frame 60 % brighter than rolling average = explosion flash
FLASH_THRESH=1.6

# Frames to suppress IR tracking after the flash ends      range: 10 – 90
# 45 = safer 1.5s post-explosion cooldown preventing debris/ground false alarms
FLASH_COOLDOWN=45

# Max fraction the horizon can rise per frame              range: 0.005 – 0.05
# Prevents the flash from spiking the auto-horizon upward
HORIZON_RISE=0.015


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  TRACKING  —  Trail & Confirmation                                      │
# └─────────────────────────────────────────────────────────────────────────┘

# Frames of position history drawn as the exhaust trail    range: 10 – 100
TRAIL_LEN=30

# Max pixel jump between frames for a track to survive     range: 40 – 200
TRACK_DIST=190

# Frames required before a bounding box is displayed       range: 1 – 6
# 4 = extremely robust anti-noise filter; ignores 1-3 frame camera glitches
TRACK_CONFIRM=4

# Frames a track is held when the target briefly disappears range: 5 – 40
TRACK_MISSED=12

# Max trail-segment gap as a multiple of TRACK_DIST        range: 1.0 – 5.0
# Segments longer than this are skipped (prevents wire-tail lines)
TRAIL_JUMP=1.5


# ┌─────────────────────────────────────────────────────────────────────────┐
# │  TRACKING  —  Multi-target IR Stability                                 │
# └─────────────────────────────────────────────────────────────────────────┘

# Dead-reckoning frames before the bounding box is hidden  range: 0 – 15
# Keeps the box visible during brief MOG2 detection gaps (anti-blink)
TRACK_COAST=6

# Speed multiplier for the assignment search radius        range: 1.0 – 4.0
# Lower = tighter ID locking; higher = allows faster target jumps
VEL_GATE=1.5

# Penalty for direction-reversal in ID assignment          range: 0.0 – 2.0
# 0.6 = stricter forward momentum continuity; prevents jumping between targets
DIR_PENALTY=0.6

# EMA weight for velocity update (new vs smoothed history) range: 0.1 – 1.0
# Lower = velocity adapts slowly; higher = reacts instantly (more jitter)
VEL_ALPHA=0.5

# Fraction of velocity applied per coasting frame          range: 0.0 – 1.0
# 0.0 = box stands still during coast; 1.0 = full drift
COAST_DRIFT=0.3

# EMA alpha for the displayed bounding box position        range: 0.1 – 1.0
# Lower = smoother box with more lag; higher = jittery but instant
BOX_SMOOTH=0.4
