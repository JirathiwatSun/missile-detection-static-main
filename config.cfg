# =============================================================================
#  Iron Dome Missile Tracker v3  -  Configuration File
# =============================================================================
#  Edit values here to tune the system without touching Python or run.bat.
#  Rules:
#    - Lines starting with # are comments (ignored)
#    - Empty lines are ignored
#    - Format: KEY=VALUE  (no spaces around the = sign)
#    - Any value can be overridden once per run on the command line,
#      e.g.  run.bat track --video ... --conf 0.30
# =============================================================================

# ---------------------------------------------------------------------------
# [Model]
# ---------------------------------------------------------------------------
# WEIGHTS  : Path to the YOLO model weights file.
WEIGHTS=models\yolo26n_custom.pt

# CONF     : (0.10-0.60) YOLO detection confidence threshold.
#            Lower = more detections (may increase false positives).
CONF=0.27

# ---------------------------------------------------------------------------
# [Hardware]
# ---------------------------------------------------------------------------
# DEVICE   : 0 = primary GPU, cpu = CPU-only, empty = auto-detect.
DEVICE=0

# ---------------------------------------------------------------------------
# [Night / IR Detector]
# ---------------------------------------------------------------------------
# BRIGHT_THRESH : (100-220) Pixel brightness for exhaust detection.
#                 Lower catches dimmer exhausts; raise if city lights cause false positives.
BRIGHT_THRESH=120

# MIN_FLAME     : (2-20) Minimum IR blob area in pixels.
#                 4 = rejects 1×1 sub-pixel camera noise.
MIN_FLAME=4

# MAX_FLAME     : (10000-200000) Maximum IR blob area.
#                 Prevents large explosion fireballs from being tracked as missiles.
MAX_FLAME=150000

# EDGE_MARGIN   : (0.02-0.10) Fraction of frame edge to ignore (removes TV logos/borders).
EDGE_MARGIN=0.06

# MAX_ASPECT    : (2.0-10.0) Aspect-ratio gate. Rejects elongated blobs (missiles are compact).
MAX_ASPECT=5.0

# GROUND_FRAC   : (0.40-0.95) Initial horizon fraction.
#                 Auto-ground mode tunes from this baseline in night mode.
#                 Ignored in day mode (forced to 1.0 = no exclusion).
GROUND_FRAC=0.70

# ---------------------------------------------------------------------------
# [IR Cluster Filter  -  city-light rejection]
# ---------------------------------------------------------------------------
# CLUSTER_RADIUS : (20-120) px. Blobs closer than this are counted as neighbors.
CLUSTER_RADIUS=60

# CLUSTER_MAX    : (2-10) Max neighbor count before a blob is rejected as a city-light cluster.
#                  10 = allows large missile salvos before rejection kicks in.
CLUSTER_MAX=10

# ---------------------------------------------------------------------------
# [Background Subtractor  -  MOG2]
# ---------------------------------------------------------------------------
# MOG_HISTORY : (50-500) Frames used to model the static background.
#               150 = ~5 s at 30 fps before a stopped object fades to background.
MOG_HISTORY=150

# MOG_VAR     : (10-60) Variance threshold. Lower = flags more motion.
MOG_VAR=25

# ---------------------------------------------------------------------------
# [IR Detection Confidence]
# ---------------------------------------------------------------------------
# FLAME_MIN_CONF : (0.10-0.50) IR hit confidence gate (above ground line).
FLAME_MIN_CONF=0.25

# ---------------------------------------------------------------------------
# [Static Light Filter]
# ---------------------------------------------------------------------------
# STATIC_GRID  : (10-60) Grid cell size in pixels.
STATIC_GRID=30

# WORLD_THRESH : (3-20) Frames before a world-coord static light is suppressed.
#                18 = missiles can hover head-on ~0.7 s before being assumed as city lights.
WORLD_THRESH=18

# CAM_THRESH   : (10-40) Frames before a screen-coord static light is suppressed (TV logos).
CAM_THRESH=25

# STATIC_DECAY : (5-30) Frames before a suppressed cell is forgotten and re-enabled.
STATIC_DECAY=15

# ---------------------------------------------------------------------------
# [Tracking Logic]
# ---------------------------------------------------------------------------
# TRAIL_LEN     : (10-100) Frames of position history drawn as the exhaust trail.
TRAIL_LEN=30

# TRACK_DIST    : (40-200) Max pixels a missile can move between frames and stay tracked.
TRACK_DIST=190

# TRACK_CONFIRM : (1-6) Frames required before a track box is shown on screen.
#                 3 = filters single-frame camera flashes.
TRACK_CONFIRM=3

# TRACK_MISSED  : (5-40) Frames a track is held when the missile briefly disappears.
TRACK_MISSED=12

# ---------------------------------------------------------------------------
# [Multi-target IR Tracker Stability]
# ---------------------------------------------------------------------------
# TRACK_COAST : (0-15) Dead-reckoning frames before the bounding box is hidden.
#               6 = box stays visible 6 frames during brief MOG2 gaps (anti-blink).
TRACK_COAST=6

# VEL_GATE    : (1.0-4.0) Speed multiplier for the Hungarian assignment search radius.
#               1.5 = search area grows modestly with speed; lower = tighter ID locking.
VEL_GATE=1.5

# DIR_PENALTY : (0.0-2.0) Penalty for direction-reversals in ID assignment.
#               0.4 = soft tie-breaker; 0.0 = off; higher = stricter direction lock.
DIR_PENALTY=0.4

# VEL_ALPHA   : (0.1-1.0) EMA weight for velocity update.
#               0.5 = balanced; lower = velocity adapts slowly; higher = instant jitter.
VEL_ALPHA=0.5

# COAST_DRIFT : (0.0-1.0) Fraction of velocity applied per coasting frame.
#               0.3 = box barely moves during coast; 0.0 = box stands still.
COAST_DRIFT=0.3

# BOX_SMOOTH  : (0.1-1.0) EMA alpha for the displayed bounding box position.
#               0.4 = smooth stable box; higher = jittery raw detection.
BOX_SMOOTH=0.4

# TRAIL_JUMP  : (1.0-5.0) Max allowed gap between trail points as multiple of TRACK_DIST.
#               Segments longer than this multiple are skipped (prevents wire-tail lines).
#               Lower = stricter; useful when IR sources are tightly packed.
TRAIL_JUMP=1.5

# ---------------------------------------------------------------------------
# [Explosion / Flash Immunity]
# ---------------------------------------------------------------------------
# FLASH_THRESH    : (1.2-3.0) Brightness ratio (current / rolling average) that triggers
#                   flash detection. 1.6 = frame 60% brighter than normal = flash.
FLASH_THRESH=1.6

# FLASH_COOLDOWN  : (10-90) Frames to suppress IR detection after the flash ends.
#                   30 = ~1 s cooldown at 30 fps; prevents post-explosion false alarms.
FLASH_COOLDOWN=30

# HORIZON_RISE    : (0.005-0.05) Max fraction the horizon line can shift upward per frame.
#                   0.015 = 1.5 % per frame; prevents explosion flash spiking the horizon.
HORIZON_RISE=0.015

# ---------------------------------------------------------------------------
# [Below-Ground Detection  -  two-zone confidence gating]
# ---------------------------------------------------------------------------
# BELOW_GROUND_CONF : (0.10-1.00) Min IR confidence for detections BELOW the horizon.
#                     1.00 = effectively disabled; 0.25 = permissive (low-altitude missiles).
BELOW_GROUND_CONF=0.27

# YOLO_GROUND_CONF  : (0.50-1.00) Min YOLO confidence for detections BELOW the horizon.
#                     1.00 = effectively disabled; 0.50 = permissive.
YOLO_GROUND_CONF=0.80

# ---------------------------------------------------------------------------
# [Auto Ground Exclusion  -  night mode only]
# ---------------------------------------------------------------------------
# AUTO_ALPHA  : (0.05-0.50) EMA speed for the auto-horizon tracker.
#               Lower = smoother / more stable horizon line.
AUTO_ALPHA=0.10

# ---------------------------------------------------------------------------
# [Sensitivity & Display]
# ---------------------------------------------------------------------------
# NIGHT_SENS       : (30-100) Mean frame brightness below which night mode activates.
NIGHT_SENS=60

# DEF_FILTER       : Default display filter.  Options: thermal | nvg | original
DEF_FILTER=thermal

# NIGHT_CONF_OFFSET: (0.00-0.25) YOLO confidence reduction applied in night mode.
NIGHT_CONF_OFFSET=0.10

# CAM_MOTION       : (0.01-0.15) Phase-correlation threshold for camera-shake compensation.
CAM_MOTION=0.03
